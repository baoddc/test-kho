<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kho Xà gồ - Tồn</title>

  <!-- Logo hiển thị trên tab -->
  <link rel="icon" type="image/png" href="assets/img/Logo-DDC.png">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <!-- Sidebar CSS -->
  <link rel="stylesheet" href="assets/css/sidebar.css">
  <link rel="stylesheet" href="assets/css/home.css">
  <link rel="stylesheet" href="assets/css/xg/xg-ton.css">
</head>

<body class="fixed-viewport">

  <!-- ==================== MAIN CONTENT ==================== -->
  <div class="container-fluid main-content">

    <div class="row">
      <!-- Data Table Column - Full Width -->
      <div class="col-12">
        <!-- Title Row -->
        <div class="d-flex align-items-center mb-2">
          <div class="me-auto">
            <h5 class="mb-0 text-primary fw-bold">Dữ liệu Tồn xà gồ</h5>
          </div>
        </div>

        <!-- Search and Actions Row -->
        <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
          <div class="flex-grow-1">
            <input type="text" id="searchInput" class="form-control form-control-sm"
              placeholder="Tìm Mã vật tư và Tên vật tư">
          </div>
          <div>
            <button id="btnResetFilter" class="btn btn-secondary btn-sm">Reset</button>
          </div>
          <div>
            <button id="btnExport" class="btn btn-success btn-sm" disabled>
              Tải file Excel (.xlsx)
            </button>
          </div>
        </div>

        <!-- Loading indicator -->
        <div id="loading">Đang tải dữ liệu...</div>

        <!-- Data Table -->
        <div class="table-responsive mt-3">
          <table id="dataTable" class="table table-bordered table-hover">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>

        <!-- Pagination Controls -->
        <div class="d-flex align-items-center justify-content-end mb-0 flex-wrap" style="margin-top: 2px;">
          <div class="d-flex align-items-center gap-2">
            <button id="prevPage" class="btn btn-sm btn-outline-secondary">← Trang trước</button>
            <select id="pageSelect" class="form-select form-select-sm" style="width: auto;">
              <!-- Page options will be populated by JavaScript -->
            </select>
            <button id="nextPage" class="btn btn-sm btn-outline-secondary">Trang sau →</button>
          </div>
          <div class="text-muted small ms-3">
            <span id="pageInfo">Trang 1 / 1</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Row Detail Modal -->
  <div class="modal fade" id="rowDetailModal" tabindex="-1" aria-labelledby="rowDetailModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content shadow border-0">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="rowDetailModalLabel">Chi tiết thông tin</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-4" id="rowDetailContent">
          <!-- Content populated by JS -->
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== SCRIPTS ==================== -->


  <!-- SheetJS (xlsx) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- Custom JavaScript -->
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="assets/js/supabase-config.js"></script>

  <!-- Sidebar JS (auto-injects sidebar + topbar) -->
  <script src="assets/js/sidebar.js"></script>
  <script src="assets/js/home.js"></script>
  <script src="assets/js/xg/xg-ton-supabase.js"></script>

  <!-- Bootstrap JS (for dropdown) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
