<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mất kết nối Internet - Kho Phôi DDC</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .offline-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }
    .icon-wrapper {
      width: 80px;
      height: 80px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem auto;
      color: #ef4444;
    }
    .icon-wrapper svg {
      width: 40px;
      height: 40px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #f8fafc;
    }
    p {
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 1.75rem;
    }
    .btn-retry {
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn-retry:hover {
      background-color: #1d4ed8;
    }
    .btn-retry:active {
      transform: scale(0.98);
    }
    .status-badge {
      margin-top: 1.5rem;
      display: inline-block;
      font-size: 0.8rem;
      padding: 0.35rem 0.75rem;
      border-radius: 9999px;
      background: #334155;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="icon-wrapper">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.657a9 9 0 010-12.728m0 0l2.829 2.829m-2.829-2.829L3 3m5.636 5.636a5 5 0 017.072 0"></path>
      </svg>
    </div>
    <h1>Không có kết nối Internet</h1>
    <p>Hệ thống Quản lý Kho Phôi DDC cần kết nối mạng để tải dữ liệu kho thực tế. Vui lòng kiểm tra lại kết nối Wi-Fi hoặc 4G/5G của bạn.</p>
    <button class="btn-retry" onclick="window.location.reload()">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
      </svg>
      Thử tải lại trang
    </button>
    <div>
      <span class="status-badge" id="online-status">Đang ngoại tuyến</span>
    </div>
  </div>

  <script>
    window.addEventListener('online', function() {
      document.getElementById('online-status').textContent = 'Đã có kết nối! Đang tải lại...';
      document.getElementById('online-status').style.background = '#166534';
      document.getElementById('online-status').style.color = '#4ade80';
      setTimeout(() => {
        window.location.reload();
      }, 1000);
    });
  </script>
</body>
</html>
