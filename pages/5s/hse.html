<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSE Management System</title>

    <!-- Logo hiển thị trên tab -->
    <link rel="icon" type="image/png" href="assets/img/Logo-DDC.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../../assets/img/Logo-DDC.png">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS Dependencies -->
    <!-- Sidebar CSS -->
  <link rel="stylesheet" href="/assets/css/sidebar.css">
  <link rel="stylesheet" href="/assets/css/home.css">
    <link rel="stylesheet" href="/assets/css/5s/hse.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body class="midnight-neo">


    <main class="dashboard-content">
        <!-- New Search Bar (styled to match theme) -->
        <div class="search-section">
            <h1 class="brand-text">Hệ thống quản lý HSE</h1>
            <div class="search-bar">
                <div class="search-input-wrapper">

                    <input type="text" id="globalSearch" placeholder="Tìm kiếm chức năng, dữ liệu...">
                </div>
            </div>
        </div>

        <div class="dashboard-grid" id="moduleGrid">
            <!-- Loading Indicator -->
            <div id="loadingOverlay" class="loading-overlay">
                <div class="spinner"></div>
                <p>Đang tải dữ liệu HSE...</p>
            </div>

            <!-- Cards will be injected here by JS -->
        </div>
    </main>

    <!-- Modal for Detail View -->
    <div id="detailModal" class="modal-backdrop">
        <div class="modal-content glass-card">
            <header class="modal-header">
                <h2 id="modalTitle">Chi tiết chức năng</h2>
                <button class="close-modal" id="closeModal">&times;</button>
            </header>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Sidebar JS (auto-injects sidebar + topbar) -->
  <script src="/assets/js/sidebar.js"></script>
  <script src="/assets/js/home.js"></script>
    <script src="/assets/js/5s/hse.js" defer></script>
</body>

</html>
