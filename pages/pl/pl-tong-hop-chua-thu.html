<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tổng hợp phế liệu</title>

    <!-- Logo hiển thị trên tab -->
    <link rel="icon" type="image/png" href="assets/img/Logo-DDC.png">

    <!-- Tailwind CSS (CDN for plain HTML usage) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- PapaParse for CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/css/pl/pl-tong-hop-chua-thu.css">
</head>

<body
    class="bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-50 via-slate-100 to-slate-200 font-sans min-h-screen">

    <!-- Back Button -->
    <a href="pl-chua-thu.html"
        class="fixed top-6 left-6 z-[60] group flex items-center gap-2 rounded-xl bg-white/80 backdrop-blur-md px-4 py-2 text-sm font-bold text-slate-700 shadow-sm border border-slate-200/60 hover:bg-white hover:shadow-md hover:-translate-x-1 transition-all duration-300 no-underline">
        <i data-lucide="chevron-left"
            class="h-5 w-5 text-blue-600 group-hover:-translate-x-0.5 transition-transform"></i>
        <span>Quay lại</span>
    </a>

    <!-- Navigation Tabs -->
    <nav
        class="fixed top-6 left-1/2 -translate-x-1/2 z-[60] flex items-center p-1 bg-white/80 backdrop-blur-md rounded-2xl shadow-lg border border-slate-200/60 transition-all duration-300">
        <a href="pl-tong-hop-can-thu.html"
            class="flex items-center gap-2 px-3 md:px-4 py-2 rounded-xl text-sm font-bold transition-all duration-300 no-underline text-slate-600 hover:bg-slate-100/50 hover:text-blue-600">
            <i data-lucide="list-todo" class="h-4 w-4"></i>
            <span class="hidden sm:inline">Cần thu</span>
        </a>
        <a href="pl-tong-hop-da-thu.html"
            class="flex items-center gap-2 px-3 md:px-4 py-2 rounded-xl text-sm font-bold transition-all duration-300 no-underline text-slate-600 hover:bg-slate-100/50 hover:text-blue-600">
            <i data-lucide="check-check" class="h-4 w-4"></i>
            <span class="hidden sm:inline">Đã thu</span>
        </a>
        <a href="pl-tong-hop-chua-thu.html"
            class="flex items-center gap-2 px-3 md:px-4 py-2 rounded-xl text-sm font-bold transition-all duration-300 no-underline bg-blue-600 text-white shadow-md shadow-blue-200">
            <i data-lucide="clock" class="h-4 w-4"></i>
            <span class="hidden sm:inline">Chưa thu</span>
        </a>
    </nav>

    <div id="app"></div>
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <!-- Supabase config -->
    <script src="/assets/js/supabase-config.js"></script>
    <script src="/assets/js/pl/pl-tong-hop-chua-thu.js"></script>
</body>

</html>
